                           <div class="progress-bar" id="progressBar-${i}"></div>
                       </div>
                   </div>
               `;
               
               slider.appendChild(item);
               
               if (pos === 1) {
                   loadVideoSource(item, series, i);
                   const nextIdx = (safeIdx + 1) % playList.length;
                   const nextSeries = playList[nextIdx];
                   preloadVideoBlob(nextSeries);
               }
           });
           
           document.title = isFavoritesMode ? '喜欢列表' : '短视频';
       }
       
       async function loadVideoSource(item, series, index) {
           const video = item.querySelector('video');
           const spinner = item.querySelector('.loading-spinner');
           const fetchingTip = document.getElementById('fetchingTip');
           const timeDisplay = document.getElementById(`timeDisplay-${index}`);
           const progressBar = document.getElementById(`progressBar-${index}`);
           
           if (loadTimeout) {
               clearTimeout(loadTimeout);
               loadTimeout = null;
           }
           
           if (item.classList.contains('active')) {
               fetchingTip.classList.add('show');
           }
           
           spinner.style.display = 'block';
           
           let videoUrl = videoBlobCache.get(series);
           
           if (!videoUrl) {
               videoUrl = await fetchVideoUrl(series);
               if (videoUrl) {
                   preloadVideoBlob(series);
               }
           }
           
           fetchingTip.classList.remove('show');
           
           if (videoUrl) {
               video.src = videoUrl;
               
               loadTimeout = setTimeout(() => {
                   if (spinner.style.display === 'block') {
                       spinner.style.display = 'none';
                       handleFail(series, '加载超时');
                   }
               }, 3000);
               
               video.addEventListener('loadeddata', () => {
                   if (loadTimeout) {
                       clearTimeout(loadTimeout);
                       loadTimeout = null;
                   }
                   spinner.style.display = 'none';
                   if (item.classList.contains('active') && isPlaying) {
                       video.play().catch(e => console.log('自动播放被阻止'));
                   }
                   
                   resetFailCount(series);
                   
                   if (timeDisplay) {
                       timeDisplay.textContent = `00:00 / ${formatTime(video.duration)}`;
                   }
               });
               
               video.addEventListener('waiting', () => {
                   if (!videoBlobCache.has(series)) {
                       spinner.style.display = 'block';
                   }
               });
               
               video.addEventListener('playing', () => {
                   spinner.style.display = 'none';
                   resetFailCount(series);
               });
               
               video.addEventListener('timeupdate', () => {
                   if (item.classList.contains('active') && video.duration) {
                       const progress = (video.currentTime / video.duration) * 100;
                       if (progressBar) progressBar.style.width = progress + '%';
                       
                       if (timeDisplay) {
                           timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
                       }
                   }
               });
               
               video.addEventListener('ended', () => {
                   if (item.classList.contains('active')) handleVideoEnded(item);
               });
               
               video.addEventListener('click', () => togglePlay(item));
               
               video.addEventListener('error', (e) => {
                   if (loadTimeout) {
                       clearTimeout(loadTimeout);
                       loadTimeout = null;
                   }
                   spinner.style.display = 'none';
                   
                   handleFail(series, '视频加载错误');
               });
               
               video.load();
           } else {
               spinner.style.display = 'none';
               handleFail(series, '获取视频链接失败');
           }
       }
       
       function handleVideoEnded(item) {
           if (isLoopMode) {
               const video = item.querySelector('video');
               if (video) {
                   video.currentTime = 0;
                   video.play().catch(e => console.log('播放被阻止'));
               }
           } else {
               hideAutoplayHint();
               if (isFavoritesMode) {
                   playNextFav();
               } else {
                   playNext();
               }
           }
       }
       
       function toggleLoopMode(btn) {
           isLoopMode = !isLoopMode;
           
           const activeItem = document.querySelector('.video-item.active');
           if (activeItem) {
               const video = activeItem.querySelector('video');
               if (video) {
                   video.loop = isLoopMode;
               }
           }
           
           const loopBtns = document.querySelectorAll('.action-btn[onclick*="toggleLoopMode"]');
           loopBtns.forEach(loopBtn => {
               if (isLoopMode) {
                   loopBtn.classList.add('loop-active');
                   const icon = loopBtn.querySelector('.action-icon i');
                   if (icon) {
                       icon.className = 'fas fa-repeat';
                   }
                   const countSpan = loopBtn.querySelector('.action-count');
                   if (countSpan) countSpan.textContent = '循环';
               } else {
                   loopBtn.classList.remove('loop-active');
                   const icon = loopBtn.querySelector('.action-icon i');
                   if (icon) {
                       icon.className = 'fas fa-forward';
                   }
                   const countSpan = loopBtn.querySelector('.action-count');
                   if (countSpan) countSpan.textContent = '连续';
               }
           });
           
           showToast(isLoopMode ? '已开启循环播放' : '已开启连续播放', 'info');
       }
       
       function togglePlay(item) {
           const video = item.querySelector('video');
           const centerPlay = document.getElementById('centerPlay');
           
           if (!video.src) return;
           
           if (video.paused) {
               video.play();
               isPlaying = true;
               hideAutoplayHint();
               centerPlay.innerHTML = '<i class="fas fa-play"></i>';
           } else {
               video.pause();
               isPlaying = false;
               centerPlay.innerHTML = '<i class="fas fa-pause"></i>';
               centerPlay.classList.add('show');
               setTimeout(() => centerPlay.classList.remove('show'), 1000);
           }
       }
       
       function seekVideo(e, container) {
           const video = container.parentElement.querySelector('video');
           if (!video.duration) return;
           
           const progressBarContainer = container.querySelector('.progress-bar-container');
           if (!progressBarContainer) return;
           
           const rect = progressBarContainer.getBoundingClientRect();
           const pos = (e.clientX - rect.left) / rect.width;
           
           const seekTime = Math.max(0, Math.min(pos, 1)) * video.duration;
           video.currentTime = seekTime;
       }
       
       function showAutoplayHint() {
           const hint = document.getElementById('autoplayHint');
           const countdown = document.getElementById('countdown');
           hint.classList.add('show');
           
           let count = 3;
           countdown.textContent = count;
           
           countdownTimer = setInterval(() => {
               count--;
               countdown.textContent = count;
               if (count <= 0) {
                   clearInterval(countdownTimer);
                   hint.classList.remove('show');
                   if (isFavoritesMode) {
                       playNextFav();
                   } else {
                       playNext();
                   }
               }
           }, 1000);
       }
       
       function hideAutoplayHint() {
           document.getElementById('autoplayHint').classList.remove('show');
           clearTimeout(autoplayTimer);
           clearInterval(countdownTimer);
       }
       
       function playNext() {
           hideAutoplayHint();
           if (loadTimeout) {
               clearTimeout(loadTimeout);
               loadTimeout = null;
           }
           
           const playList = allSeries.filter(series => !failedSeries.has(series));
           
           if (playList.length === 0) {
               showToast('没有可播放的视频', 'error');
               return;
           }
           
           let nextIndex = currentIndex + 1;
           
           if (nextIndex >= allSeries.length) {
               nextIndex = 0;
           }
           
           let attempts = 0;
           while (failedSeries.has(allSeries[nextIndex]) && attempts < allSeries.length) {
               nextIndex = (nextIndex + 1) % allSeries.length;
               attempts++;
           }
           
           if (attempts >= allSeries.length) {
               showToast('没有可播放的视频', 'error');
               return;
           }
           
           currentIndex = nextIndex;
           renderVideos();
           isPlaying = true;
       }
       
       function playNextFav() {
           hideAutoplayHint();
           if (loadTimeout) {
               clearTimeout(loadTimeout);
               loadTimeout = null;
           }
           
           if (favorites.length === 0) {
               showToast('喜欢列表为空', 'error');
               return;
           }
           
           favCurrentIndex = (favCurrentIndex + 1) % favorites.length;
           
           renderVideos();
           isPlaying = true;
           updateFavoritesUI();
       }
       
       function playPrev() {
           hideAutoplayHint();
           if (loadTimeout) {
               clearTimeout(loadTimeout);
               loadTimeout = null;
           }
           
           if (isFavoritesMode) {
               if (favorites.length === 0) return;
               favCurrentIndex = (favCurrentIndex - 1 + favorites.length) % favorites.length;
           } else {
               const playList = allSeries.filter(series => !failedSeries.has(series));
               
               if (playList.length === 0) {
                   showToast('没有可播放的视频', 'error');
                   return;
               }
               
               let prevIndex = currentIndex - 1;
               let attempts = 0;
               
               while (prevIndex >= 0 && failedSeries.has(allSeries[prevIndex]) && attempts < allSeries.length) {
                   prevIndex--;
                   attempts++;
               }
               
               if (prevIndex < 0) {
                   prevIndex = allSeries.length - 1;
                   attempts = 0;
                   while (prevIndex >= 0 && failedSeries.has(allSeries[prevIndex]) && attempts < allSeries.length) {
                       prevIndex--;
                       attempts++;
                   }
               }
               
               if (prevIndex >= 0 && !failedSeries.has(allSeries[prevIndex])) {
                   currentIndex = prevIndex;
               } else {
                   showToast('无法切换到上一个视频', 'error');
                   return;
               }
           }
           
           renderVideos();
           isPlaying = true;
           updateFavoritesUI();
       }
       
       function playFavoritesMode() {
           if (favorites.length === 0) {
               showToast('喜欢列表为空', 'error');
               return;
           }
           
           isFavoritesMode = true;
           favCurrentIndex = 0;
           
           toggleFavorites();
           renderVideos();
           isPlaying = true;
           
           showToast('开始播放喜欢的视频', 'success');
       }
       
       function setupGestures() {
           const slider = document.getElementById('videoSlider');
           let startY = 0;
           
           slider.addEventListener('touchstart', (e) => {
               startY = e.touches[0].clientY;
           }, { passive: true });
           
           slider.addEventListener('touchend', (e) => {
               const endY = e.changedTouches[0].clientY;
               const diff = startY - endY;
               
               if (Math.abs(diff) > 80) {
                   if (diff > 0) {
                       isFavoritesMode ? playNextFav() : playNext();
                   } else {
                       playPrev();
                   }
               }
           }, { passive: true });
           
           let wheelTimeout;
           slider.addEventListener('wheel', (e) => {
               clearTimeout(wheelTimeout);
               wheelTimeout = setTimeout(() => {
                   if (e.deltaY > 50) {
                       isFavoritesMode ? playNextFav() : playNext();
                   } else if (e.deltaY < -50) {
                       playPrev();
                   }
               }, 50);
           });
       }
       
       function toggleLike(series, btn) {
           const index = favorites.indexOf(series);
           const heartIcon = btn.querySelector('.heart-icon');
           const count = btn.querySelector('.action-count');
           
           if (index > -1) {
               favorites.splice(index, 1);
               btn.classList.remove('liked');
               heartIcon.className = 'far fa-heart heart-icon';
               count.textContent = '喜欢';
               showToast('已取消喜欢', 'info');
               
               if (isFavoritesMode && series === favorites[favCurrentIndex]) {
                   if (favorites.length === 0) {
                       isFavoritesMode = false;
                   } else {
                       favCurrentIndex = favCurrentIndex % favorites.length;
                   }
                   renderVideos();
               }
               
               localStorage.removeItem(`thumb_${series}`);
               delete favoriteUrls[series];
           } else {
               fetchVideoUrl(series).then(videoUrl => {
                   if (videoUrl) {
                       favoriteUrls[series] = videoUrl;
                       localStorage.setItem('favoriteUrls', JSON.stringify(favoriteUrls));
                   }
               });
               
               favorites.push(series);
               btn.classList.add('liked');
               heartIcon.className = 'fas fa-heart heart-icon';
               count.textContent = '已喜欢';
               showToast('已添加到喜欢列表', 'success');
               
               updateFavoritesUI();
               
               setTimeout(() => {
                   generateThumbnail(series).then(thumb => {
                       if (thumb) {
                           console.log('缩略图生成成功');
                       }
                   });
               }, 100);
           }
           
           saveFavorites();
           updateFavoritesUI();
           updateFavBadge();
       }
       
       function saveFavorites() {
           localStorage.setItem('videoFavorites', JSON.stringify(favorites));
           localStorage.setItem('favoriteUrls', JSON.stringify(favoriteUrls));
       }
       
       function updateFavBadge() {
           const badge = document.getElementById('favBadge');
           if (favorites.length > 0 && !document.getElementById('favoritesDrawer').classList.contains('open')) {
               badge.textContent = favorites.length;
               badge.style.display = 'block';
           } else {
               badge.style.display = 'none';
           }
       }
       
       function updateFailedBadge() {
           const badge = document.getElementById('failedBadge');
           if (failedSeries.size > 0 && !document.getElementById('failedDrawer').classList.contains('open')) {
               badge.textContent = failedSeries.size;
               badge.style.display = 'block';
           } else {
               badge.style.display = 'none';
           }
       }
       
       function updateFailedUI() {
           updateErrorList();
           updateTimeoutList();
           updateFailedBadge();
       }
       
       function updateFavoritesUI() {
           const list = document.getElementById('favoritesList');
           const countSpan = document.querySelector('#favCount');
           
           countSpan.textContent = favorites.length;
           
           if (favorites.length === 0) {
               list.innerHTML = `
                   <div class="empty-favorites">
                       <div class="empty-icon"><i class="fas fa-heart-crack"></i></div>
                       <div>还没有喜欢的视频</div>
                       <div style="font-size: 1rem; margin-top: 15px; opacity: 0.6;">
                           点击 <i class="fas fa-heart" style="color: var(--primary);"></i> 收藏喜欢的内容
                       </div>
                   </div>
               `;
               return;
           }
           
           const currentSeries = isFavoritesMode ? favorites[favCurrentIndex] : null;
           
           list.innerHTML = favorites.map((series, idx) => {
               const isActive = series === currentSeries;
               const thumb = localStorage.getItem(`thumb_${series}`);
               
               return `
                   <div class="favorite-item ${isActive ? 'active' : ''}" onclick="playFromFavorites(${idx})">
                       <div class="favorite-thumb">
                           ${thumb ? `<img src="${thumb}" alt="">` : '<i class="fas fa-film"></i>'}
                           <div class="play-icon"><i class="fas fa-play"></i></div>
                       </div>
                       <div class="favorite-info">
                           <div class="favorite-name">
                               <i class="fas fa-tag"></i>
                               ${series}
                           </div>
                           <div class="favorite-meta">
                               ${isActive ? '<span class="playing-badge"><i class="fas fa-music"></i> 播放中</span>' : `<span><i class="fas fa-play"></i> 第 ${idx + 1} 个</span>`}
                           </div>
                       </div>
                       <button class="favorite-remove" onclick="event.stopPropagation(); removeFavorite('${series}')" title="删除">
                           <i class="fas fa-trash-can"></i>
                       </button>
                   </div>
               `;
           }).join('');
       }
       
       function playFromFavorites(index) {
           if (index >= favorites.length) return;
           
           favCurrentIndex = index;
           isFavoritesMode = true;
           
           toggleFavorites();
           renderVideos();
           isPlaying = true;
           updateFavoritesUI();
           showToast(`正在播放: ${favorites[index]}`, 'info');
       }
       
       function removeFavorite(series) {
           const index = favorites.indexOf(series);
           if (index > -1) {
               localStorage.removeItem(`thumb_${series}`);
               delete favoriteUrls[series];
               
               favorites.splice(index, 1);
               saveFavorites();
               updateFavoritesUI();
               updateFavBadge();
               
               if (isFavoritesMode) {
                   if (favorites.length === 0) {
                       isFavoritesMode = false;
                       currentIndex = 0;
                   } else if (index <= favCurrentIndex) {
                       favCurrentIndex = Math.max(0, favCurrentIndex - 1);
                   }
                   renderVideos();
               }
               
               showToast('已从喜欢列表移除', 'info');
           }
       }
       
       function toggleFavorites() {
           const drawer = document.getElementById('favoritesDrawer');
           const overlay = document.getElementById('overlay');
           const btn = document.getElementById('favBtn');
           
           document.getElementById('failedDrawer').classList.remove('open');
           
           drawer.classList.toggle('open');
           overlay.classList.toggle('active');
           btn.classList.toggle('active');
           
           if (drawer.classList.contains('open')) {
               updateFavoritesUI();
               setTimeout(preloadThumbnails, 100);
           }
           
           updateFavBadge();
       }
       
       function toggleFailedDrawer() {
           const drawer = document.getElementById('failedDrawer');
           const overlay = document.getElementById('overlay');
           const btn = document.getElementById('failedBtn');
           
           document.getElementById('favoritesDrawer').classList.remove('open');
           
           drawer.classList.toggle('open');
           overlay.classList.toggle('active');
           btn.classList.toggle('active');
           
           if (drawer.classList.contains('open')) {
               updateFailedUI();
               // 重置位置
               resetFailedPosition();
           }
           
           updateFailedBadge();
       }
       
       function closeAllDrawers() {
           document.getElementById('favoritesDrawer').classList.remove('open');
           document.getElementById('failedDrawer').classList.remove('open');
           document.getElementById('overlay').classList.remove('active');
           document.getElementById('favBtn').classList.remove('active');
           document.getElementById('failedBtn').classList.remove('active');
           
           updateFavBadge();
           updateFailedBadge();
       }
       
       async function copyLink(series) {
           const videoUrl = await fetchVideoUrl(series);
           if (videoUrl) {
               navigator.clipboard.writeText(videoUrl).then(() => {
                   showToast('视频链接已复制', 'success');
               });
           } else {
               showToast('获取链接失败', 'error');
           }
       }
       
       function showToast(msg, type = 'info') {
           const toast = document.getElementById('toast');
           const icon = toast.querySelector('i');
           const span = toast.querySelector('span');
           
           span.textContent = msg;
           
           if (type === 'success') {
               icon.className = 'fas fa-circle-check';
               icon.style.color = '#4caf50';
           } else if (type === 'error') {
               icon.className = 'fas fa-circle-exclamation';
               icon.style.color = '#f44336';
           } else if (type === 'timeout') {
               icon.className = 'fas fa-hourglass-end';
               icon.style.color = '#ff9800';
           } else {
               icon.className = 'fas fa-circle-info';
               icon.style.color = 'var(--primary)';
           }
           
           toast.classList.add('show');
           setTimeout(() => toast.classList.remove('show'), 2000);
       }
       
       init();
   </script>
</body>
</html>
