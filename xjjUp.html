<!DOCTYPE html>
<html lang="zh-CN">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>靓丽短视频</title>
   <!-- Font Awesome 6 (图标库) -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
           -webkit-tap-highlight-color: transparent;
       }
       
       :root {
           --primary: #fe2c55;
           --primary-light: #ff4d6d;
           --bg-dark: #000;
           --text-light: #fff;
           --text-gray: rgba(255,255,255,0.6);
       }
       
       html, body { height: 100%; overflow: hidden; background: var(--bg-dark); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
       
       .app-container {
           height: 100vh; width: 100vw; position: relative; overflow: hidden;
       }
       
       /* 视频滑动容器 */
       .video-slider {
           height: 100%; width: 100%; position: relative; touch-action: pan-y;
       }
       
       .video-item {
           height: 100%; width: 100%; position: absolute; top: 0; left: 0;
           opacity: 0; transition: opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
           display: flex; align-items: center; justify-content: center; background: #000;
       }
       
       .video-item.active { opacity: 1; z-index: 10; }
       .video-item.prev { transform: translateY(-100%); }
       .video-item.next { transform: translateY(100%); }
       
       video { width: 100%; height: 100%; object-fit: cover; background: #000; }
       
       /* 双层光效 */
       .video-item::before {
           content: ''; position: absolute; inset: 0;
           background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.8) 100%);
           pointer-events: none; z-index: 15; opacity: 0.9;
       }
       .video-item::after {
           content: ''; position: absolute; inset: 0;
           background: linear-gradient(135deg, rgba(254,44,85,0.15) 0%, transparent 50%, rgba(0,0,0,0.4) 100%);
           pointer-events: none; z-index: 16; opacity: 0.5; mix-blend-mode: overlay;
       }
       
       /* 底部覆盖层 */
       .video-overlay {
           position: absolute; bottom: 35px; left: 0; right: 0; padding: 20px 100px 15px 20px;
           background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
           z-index: 20; pointer-events: none; transition: opacity 0.3s, transform 0.3s;
           text-shadow: 0 4px 12px rgba(0,0,0,0.8);
       }
       .video-overlay.hidden { opacity: 0; transform: translateY(20px); pointer-events: none; }
       
       .series-name {
           font-size: 1.1rem; font-weight: 600; color: var(--text-light); margin-bottom: 6px;
           display: flex; align-items: center; gap: 6px; letter-spacing: 0.3px;
           text-shadow: 0 2px 8px rgba(0,0,0,0.9);
       }
       .series-name i { font-size: 0.9rem; color: var(--primary); filter: drop-shadow(0 2px 6px rgba(254,44,85,0.6)); }
       
       .video-meta {
           font-size: 0.85rem; color: var(--text-gray); display: flex; align-items: center; gap: 12px;
           text-shadow: 0 2px 6px rgba(0,0,0,0.8);
       }
       .tag {
           background: rgba(254,44,85,0.3); padding: 3px 10px; border-radius: 30px; font-size: 0.75rem;
           backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.15);
       }
       .tag i { margin-right: 4px; font-size: 0.7rem; }
       
       /* 顶部导航 */
       .top-nav {
           position: absolute; top: 0; left: 0; right: 0; padding: 15px 20px;
           display: flex; justify-content: space-between; align-items: center; z-index: 40;
           background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
           transition: opacity 0.3s, transform 0.3s; pointer-events: none;
       }
       .top-nav.hidden { opacity: 0; transform: translateX(30px); pointer-events: none; }
       
       .nav-left, .nav-right { display: flex; gap: 12px; pointer-events: auto; }
       
       .nav-btn {
           width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2);
           backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); color: var(--text-light);
           display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem;
           transition: all 0.3s; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
       }
       .nav-btn i { font-size: 1.2rem; }
       .nav-btn:hover { background: var(--primary); transform: scale(1.1); border-color: var(--primary); }
       .nav-btn.active { background: var(--primary); border-color: var(--primary); }
       
       .badge {
           position: absolute; top: -2px; right: -2px; background: var(--primary); color: white;
           font-size: 0.65rem; padding: 2px 5px; border-radius: 20px; min-width: 18px; text-align: center;
           border: 2px solid var(--bg-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.3);
       }
       
       /* 右侧操作栏 */
       .action-sidebar {
           position: absolute; right: 12px; bottom: 110px; display: flex; flex-direction: column;
           align-items: center; gap: 18px; z-index: 30; transition: opacity 0.3s, transform 0.3s;
           filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
       }
       .action-sidebar.hidden { opacity: 0; transform: translateX(30px); pointer-events: none; }
       
       .action-btn {
           display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;
           transition: transform 0.2s; user-select: none; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
       }
       .action-btn:active { transform: scale(0.9); }
       
       .action-icon {
           width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2);
           backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); display: flex;
           align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.3s;
           color: var(--text-light); box-shadow: 0 8px 20px rgba(0,0,0,0.5);
       }
       
       .action-btn.liked .action-icon { background: var(--primary); border-color: var(--primary); animation: likeAnimation 0.5s ease; }
       .action-btn.loop-active .action-icon { background: var(--primary); border-color: var(--primary); }
       
       @keyframes likeAnimation { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
       
       .action-count {
           font-size: 0.7rem; color: var(--text-light); font-weight: 500;
           text-shadow: 0 2px 6px rgba(0,0,0,0.8); background: rgba(0,0,0,0.4); padding: 3px 8px;
           border-radius: 30px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.15);
       }
       
       /* 进度条区域 */
       .progress-container {
           position: absolute; bottom: 0; left: 0; right: 0; height: 35px;
           background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 100%);
           z-index: 35; display: flex; align-items: center; padding: 0 15px; cursor: pointer;
           backdrop-filter: blur(3px); box-shadow: 0 -5px 20px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.1);
       }
       
       .time-display {
           color: var(--text-light); font-size: 0.8rem; font-weight: 500; min-width: 85px;
           padding: 4px 10px; border-radius: 30px; text-align: center; position: relative; z-index: 36;
       }
       .time-display::before {
           content: ''; position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(254,44,85,0.2) 0%, transparent 80%);
           border-radius: 30px; z-index: -1; opacity: 0.5;
       }
       
       .progress-bar-container {
           flex: 1; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; margin: 0 10px;
           position: relative; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
       }
       .progress-bar {
           height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); width: 0%;
           border-radius: 4px; transition: width 0.1s linear; position: relative;
           box-shadow: 0 0 15px var(--primary);
       }
       .progress-bar::after {
           content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%);
           width: 10px; height: 10px; background: white; border-radius: 50%;
           box-shadow: 0 0 20px var(--primary); border: 2px solid var(--primary);
       }
       
       /* 模式指示器 */
       .mode-indicator {
           position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
           background: rgba(254,44,85,0.95); color: white; padding: 8px 22px; border-radius: 40px;
           font-size: 0.9rem; opacity: 0; transition: opacity 0.3s; z-index: 45; pointer-events: none;
           backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.25);
           display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 25px rgba(254,44,85,0.5);
       }
       .mode-indicator.show { opacity: 1; }
       
       /* 喜欢侧栏 */
       .favorites-drawer {
           position: fixed; top: 0; left: -100%; width: 100%; max-width: 420px; height: 100vh;
           background: rgba(0,0,0,0.96); z-index: 100; transition: left 0.3s ease;
           display: flex; flex-direction: column; backdrop-filter: blur(20px);
           box-shadow: 10px 0 50px rgba(0,0,0,0.8); overflow: hidden;
       }
       .favorites-drawer.open { left: 0; }
       @media (min-width: 768px) { .favorites-drawer { left: auto; right: -100%; } .favorites-drawer.open { right: 0; left: auto; } }
       
       .drawer-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.8); flex-shrink: 0; }
       .title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
       .title-section { display: flex; align-items: center; gap: 10px; }
       .heart-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: rgba(254,44,85,0.15); border-radius: 50%; border: 1px solid rgba(254,44,85,0.3); color: var(--primary); font-size: 1.5rem; }
       .main-title { font-size: 1.3rem; font-weight: 600; color: var(--text-light); }
       .close-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: var(--text-light); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
       .close-btn:hover { background: var(--primary); transform: rotate(90deg); }
       
       .buttons-row { display: flex; gap: 12px; }
       .like-count-btn, .play-all-btn {
           flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
           padding: 8px 0; border-radius: 40px; cursor: pointer; transition: 0.2s;
       }
       .like-count-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; }
       .like-count-btn .count { color: var(--primary); font-weight: 600; margin-left: 6px; background: rgba(254,44,85,0.2); padding: 3px 10px; border-radius: 30px; }
       .play-all-btn { background: var(--primary); border: none; color: white; box-shadow: 0 8px 20px rgba(254,44,85,0.5); }
       .play-all-btn:hover { background: #ff4d6d; }
       
       .favorites-list { flex: 1; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }
       
       .favorite-item {
           display: flex; align-items: center; padding: 12px; border-radius: 18px; margin-bottom: 8px;
           background: rgba(255,255,255,0.03); cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.08);
       }
       .favorite-item.active { background: linear-gradient(135deg, rgba(254,44,85,0.2), rgba(255,77,109,0.1)); border-color: var(--primary); }
       .favorite-thumb {
           width: 60px; height: 60px; border-radius: 14px; background: linear-gradient(135deg, #2a2a2a, #3a3a3a);
           display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin-right: 12px;
           flex-shrink: 0; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
       }
       .favorite-thumb img { width: 100%; height: 100%; object-fit: cover; }
       .favorite-thumb .play-icon { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; opacity: 0; transition: opacity 0.3s; color: white; }
       .favorite-item:hover .play-icon { opacity: 1; }
       .favorite-info { flex: 1; min-width: 0; }
       .favorite-name { font-weight: 500; margin-bottom: 6px; color: var(--text-light); display: flex; align-items: center; gap: 6px; }
       .favorite-meta { font-size: 0.8rem; color: var(--text-gray); display: flex; align-items: center; gap: 10px; }
       .playing-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--primary); color: white; padding: 3px 10px; border-radius: 30px; font-size: 0.75rem; }
       .playing-badge::before { content: ''; width: 5px; height: 5px; background: white; border-radius: 50%; animation: pulse 1s infinite; margin-right: 3px; }
       @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
       
       .favorite-remove {
           width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.08);
           border: 1px solid rgba(255,255,255,0.15); color: var(--text-gray); display: flex;
           align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
       }
       .favorite-remove:hover { background: var(--primary); color: white; }
       
       .empty-favorites { text-align: center; padding: 60px 20px; color: var(--text-gray); }
       .empty-favorites .empty-icon { font-size: 5rem; margin-bottom: 20px; color: var(--primary); opacity:0.7; animation: heartBeat 1.5s infinite; }
       @keyframes heartBeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
       
       /* 忽略抽屉 */
       .skip-drawer {
           position: fixed; top: 0; right: -100%; width: 100%; max-width: 420px; height: 100vh;
           background: rgba(0,0,0,0.96); z-index: 110; transition: right 0.3s ease;
           backdrop-filter: blur(20px); display: flex; flex-direction: column;
       }
       .skip-drawer.open { right: 0; }
       .skip-drawer .drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 20px; }
       .ban-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(100,100,100,0.3); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #aaa; }
       .skip-actions { display: flex; gap: 10px; padding: 15px 20px; border-bottom: 1px solid #222; }
       .skip-actions button { flex:1; background: rgba(255,255,255,0.05); border:1px solid #333; color:white; padding:10px; border-radius:40px; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; transition:0.2s; }
       .skip-actions button:hover { background: var(--primary); border-color: var(--primary); }
       .skip-list { flex:1; overflow-y: auto; padding:10px; }
       .skip-item { display: flex; align-items: center; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 16px; margin-bottom:8px; }
       .skip-item .index { width: 30px; color: #aaa; }
       .skip-item .url-preview { flex:1; color: #ccc; font-size:0.85rem; white-space: nowrap; overflow:hidden; text-overflow:ellipsis; margin:0 8px; }
       .skip-item button { width:34px; height:34px; border-radius:50%; background: rgba(255,255,255,0.05); border:1px solid #444; color:#aaa; cursor:pointer; margin-left:5px; transition:0.2s; }
       .skip-item .play-skip-btn:hover { background: var(--primary); color:white; }
       .skip-item .remove-skip-btn:hover { background: #f44336; color:white; }
       .empty-skip { text-align: center; padding: 50px 20px; color: #666; }
       
       /* 遮罩层、中央播放、自动提示、toast */
       .overlay { position: fixed; inset:0; background:rgba(0,0,0,0.7); opacity:0; pointer-events:none; transition:0.3s; z-index:90; backdrop-filter: blur(5px); }
       .overlay.active { opacity:1; pointer-events:all; }
       
       .center-play {
           position: absolute; top:50%; left:50%; transform: translate(-50%, -50%) scale(0);
           width:80px; height:80px; border-radius:50%; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px);
           display: flex; align-items: center; justify-content: center; font-size:2.2rem; color:white;
           z-index:25; transition: transform 0.4s; pointer-events: none;
       }
       .center-play.show { transform: translate(-50%, -50%) scale(1); }
       
       .autoplay-hint {
           position: absolute; top:50%; right:20px; transform: translateY(-50%);
           background: rgba(0,0,0,0.85); padding:14px 22px; border-radius:50px; display: flex;
           align-items: center; gap:14px; opacity:0; transition:0.3s; z-index:30; pointer-events: none;
           backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.15);
       }
       .autoplay-hint.show { opacity:1; }
       .autoplay-hint i { font-size:1.5rem; color: var(--primary); }
       .countdown { width:34px; height:34px; border-radius:50%; border:2px solid var(--primary); display:flex; align-items:center; justify-content:center; font-size:1rem; color:var(--primary); background:rgba(0,0,0,0.4); }
       
       .toast {
           position: fixed; top:70px; left:50%; transform: translateX(-50%) translateY(-20px);
           background: rgba(0,0,0,0.9); color:white; padding:12px 24px; border-radius:40px;
           font-size:0.9rem; opacity:0; transition:0.3s; z-index:200; backdrop-filter: blur(12px);
           display: flex; align-items: center; gap:10px; box-shadow: 0 12px 30px rgba(0,0,0,0.7);
       }
       .toast.show { opacity:1; transform: translateX(-50%) translateY(0); }
       
       .loading-spinner { display: none; position: absolute; top:50%; left:50%; width:40px; height:40px; border:4px solid rgba(255,255,255,0.2); border-top-color:var(--primary); border-radius:50%; animation: spin 1s linear infinite; z-index:50; }
       @keyframes spin { to { transform: rotate(360deg); } }
       
       /* 桌面居中 */
       @media (min-width: 768px) {
           .app-container { max-width: 480px; margin: 0 auto; border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); }
           .action-sidebar { right: calc(50% - 220px); }
           .top-nav { max-width: 480px; left: 50%; transform: translateX(-50%); }
       }
   </style>
</head>
<body>
   <div class="app-container">
       <!-- 顶部导航 -->
       <div class="top-nav" id="topNav">
           <div class="nav-left">
               <button class="nav-btn" onclick="toggleFavorites()" id="favBtn">
                   <i class="fas fa-heart"></i>
                   <span class="badge" id="favBadge" style="display: none;">0</span>
               </button>
           </div>
           <div class="nav-right">
               <button class="nav-btn" id="skipBadgeBtn" onclick="toggleSkipDrawer()">
                   <i class="fas fa-ban"></i>
                   <span class="badge" id="skipBadge">0</span>
               </button>
           </div>
       </div>
       
       <!-- 模式指示器 -->
       <div class="mode-indicator" id="modeIndicator"><i class="fas fa-sync-alt"></i><span id="modeText">普通模式</span></div>
       
       <!-- 视频容器 -->
       <div class="video-slider" id="videoSlider"></div>
       
       <!-- 中央播放按钮/自动提示/获取提示-->
       <div class="center-play" id="centerPlay"><i class="fas fa-play"></i></div>
       <div class="autoplay-hint" id="autoplayHint"><i class="fas fa-forward"></i><div class="countdown" id="countdown">3</div><span>秒后播放下一个</span></div>
   </div>
   
   <!-- 遮罩层 -->
   <div class="overlay" id="overlay" onclick="closeAllDrawers()"></div>
   
   <!-- 喜欢列表抽屉 -->
   <div class="favorites-drawer" id="favoritesDrawer">
       <div class="drawer-header">
           <div class="title-row">
               <div class="title-section"><span class="heart-icon"><i class="fas fa-heart"></i></span><span class="main-title">我的喜欢</span></div>
               <button class="close-btn" onclick="toggleFavorites()"><i class="fas fa-times"></i></button>
           </div>
           <div class="buttons-row">
               <div class="like-count-btn" onclick="toggleFavorites()"><i class="fas fa-heart"></i><span>喜欢 <span class="count" id="favCount">0</span></span></div>
               <button class="play-all-btn" onclick="playFavoritesMode()"><i class="fas fa-play"></i><span>全部播放</span></button>
           </div>
       </div>
       <div class="favorites-list" id="favoritesList"><div class="empty-favorites">...</div></div>
   </div>
   
   <!-- 忽略记录抽屉 -->
   <div class="skip-drawer" id="skipDrawer">
       <div class="drawer-header">
           <div class="title-section"><span class="ban-icon"><i class="fas fa-ban"></i></span><span class="main-title">永久忽略</span></div>
           <button class="close-btn" onclick="toggleSkipDrawer()"><i class="fas fa-times"></i></button>
       </div>
       <div class="skip-actions">
           <button onclick="playAllSkipped()"><i class="fas fa-play"></i>全部播放</button>
           <button onclick="clearAllSkipped()"><i class="fas fa-trash-can"></i>清空</button>
       </div>
       <div class="skip-list" id="skipList"><div class="empty-skip">...</div></div>
   </div>
   
   <!-- Toast提示 -->
   <div class="toast" id="toast"><i class="fas fa-info-circle"></i><span></span></div>

   <script>
       (function() {
           // ---------- 配置 ----------
           const API_URL = 'https://p.txqq.pro/api/girls?limit=20';
           let videoList = [];                     // 当前正常列表（已过滤忽略）
           let currentIndex = 0;
           let favorites = JSON.parse(localStorage.getItem('videoFavorites') || '[]');
           let favoriteThumbnails = JSON.parse(localStorage.getItem('favoriteThumbnails') || '{}');
           let skippedUrls = JSON.parse(localStorage.getItem('skippedVideoUrls') || '[]');
           
           let isPlaying = true;
           let isFavoritesMode = false;
           let favCurrentIndex = 0;
           let isLoopMode = false;
           let uiHidden = false;
           let lastTapTime = 0;
           let loadTimer = null, countdownTimer = null, autoplayTimer = null;
           
           // 常用DOM
           const slider = document.getElementById('videoSlider');
           const topNav = document.getElementById('topNav');
           const overlay = document.getElementById('overlay');
           const favDrawer = document.getElementById('favoritesDrawer');
           const skipDrawer = document.getElementById('skipDrawer');
           const toast = document.getElementById('toast');
           
           // ---------- 工具 ----------
           const showToast = (msg, type = 'info') => {
               toast.querySelector('i').className = type==='success' ? 'fas fa-circle-check' : (type==='error' ? 'fas fa-circle-exclamation' : 'fas fa-circle-info');
               toast.querySelector('span').textContent = msg;
               toast.classList.add('show');
               setTimeout(() => toast.classList.remove('show'), 2000);
           };
           
           const formatTime = s => isNaN(s) ? '00:00' : `${Math.floor(s/60)}`.padStart(2,'0')+':'+`${Math.floor(s%60)}`.padStart(2,'0');
           
           // 更新忽略徽章
           const updateSkipBadge = () => document.getElementById('skipBadge').textContent = skippedUrls.length;
           
           // 检查是否被忽略
           const isUrlSkipped = url => skippedUrls.includes(url);
           
           // 加入忽略（同时从videoList移除）
           const addToSkipped = url => {
               if (!url || skippedUrls.includes(url)) return;
               skippedUrls.push(url);
               localStorage.setItem('skippedVideoUrls', JSON.stringify(skippedUrls));
               videoList = videoList.filter(v => v.url !== url);
               updateSkipBadge();
               renderSkipList();
           };
           
           // ---------- API 加载 ----------
           async function loadVideos() {
               try {
                   const resp = await fetch(API_URL);
                   const data = await resp.json();
                   if (data.code === 0 && data.list?.length) {
                       const raw = data.list.map((item, idx) => ({ id: idx, url: item.video_url, author: item.author, describe: item.video_describe }));
                       videoList = raw.filter(v => !isUrlSkipped(v.url));
                       if (!videoList.length) console.warn('全部被忽略');
                       return true;
                   }
               } catch (e) { console.error(e); showToast('加载失败','error'); }
               return false;
           }
           
           // ---------- 生成缩略图 ----------
           async function generateThumbnail(url, retry = 0) {
               return new Promise(resolve => {
                   const video = document.createElement('video');
                   video.src = url; video.muted = true; video.crossOrigin = 'anonymous'; video.preload = 'metadata';
                   const timeout = setTimeout(() => retry<2 ? resolve(generateThumbnail(url, retry+1)) : resolve(null), 4000);
                   video.addEventListener('loadeddata', () => { video.currentTime = 0.5; });
                   video.addEventListener('seeked', () => {
                       clearTimeout(timeout);
                       const canvas = document.createElement('canvas'); canvas.width = 120; canvas.height = 120;
                       canvas.getContext('2d').drawImage(video, 0,0,120,120);
                       resolve(canvas.toDataURL('image/jpeg',0.7));
                   });
                   video.addEventListener('error', () => { clearTimeout(timeout); retry<2 ? resolve(generateThumbnail(url, retry+1)) : resolve(null); });
                   video.load();
               });
           }
           
           // ---------- 渲染视频 ----------
           function renderVideos() {
               slider.innerHTML = '';
               const playList = isFavoritesMode ? favorites : videoList;
               if (!playList.length) {
                   slider.innerHTML = '<div class="video-item active" style="color:#fff;justify-content:center">暂无视频</div>';
                   return;
               }
               let idx = isFavoritesMode ? (favCurrentIndex % favorites.length) : (currentIndex % videoList.length);
               isFavoritesMode ? (favCurrentIndex = idx) : (currentIndex = idx);
               
               const indices = [(idx-1+playList.length)%playList.length, idx, (idx+1)%playList.length];
               const positions = ['prev','active','next'];
               
               indices.forEach((i, pos) => {
                   const videoData = playList[i];
                   const url = isFavoritesMode ? videoData : videoData.url;
                   const isFav = favorites.includes(url);
                   const item = document.createElement('div');
                   item.className = `video-item ${positions[pos]}`;
                   item.dataset.url = url;
                   item.innerHTML = `
                       <video ${pos===1&&isLoopMode ? 'loop' : ''} playsinline webkit-playsinline ${pos===1?'autoplay':''} preload="auto" src="${url}"></video>
                       <div class="loading-spinner" style="display:none;"></div>
                       <div class="video-overlay ${uiHidden?'hidden':''}">
                           <div class="series-name"><i class="fas fa-at"></i>靓丽短视频</div>
                           <div class="video-meta"><span class="tag">生活棒不棒，全看爱妃旺不旺。</span></div>
                       </div>
                       <div class="action-sidebar ${uiHidden?'hidden':''}">
                           <div class="action-btn ${isFav?'liked':''}" onclick="window.toggleLike('${url}', this)">
                               <div class="action-icon"><i class="${isFav?'fas':'far'} fa-heart"></i></div>
                               <span class="action-count">${isFav?'已喜欢':'喜欢'}</span>
                           </div>
                           <div class="action-btn ${isLoopMode?'loop-active':''}" onclick="window.toggleLoopMode(this)">
                               <div class="action-icon"><i class="fas ${isLoopMode?'fa-repeat':'fa-forward'}"></i></div>
                               <span class="action-count">${isLoopMode?'循环':'连续'}</span>
                           </div>
                           <div class="action-btn" onclick="window.copyLink('${url}')">
                               <div class="action-icon"><i class="fas fa-share-nodes"></i></div>
                               <span class="action-count">分享</span>
                           </div>
                       </div>
                       <div class="progress-container" onclick="window.seekVideo(event, this)">
                           <span class="time-display" id="td-${i}-${pos}">00:00 / 00:00</span>
                           <div class="progress-bar-container"><div class="progress-bar" id="pb-${i}-${pos}"></div></div>
                       </div>
                   `;
                   slider.appendChild(item);
                   if (pos === 1) setupVideoEvents(item, url);
               });
               updateFavBadge();
           }
           
           // 单个视频事件绑定 (加载超时、短时长、错误 → 加入忽略)
           function setupVideoEvents(item, url) {
               const video = item.querySelector('video');
               const spinner = item.querySelector('.loading-spinner');
               const timeDisplay = item.querySelector('.time-display');
               const progressBar = item.querySelector('.progress-bar');
               let skipTriggered = false;
               
               if (loadTimer) clearTimeout(loadTimer);
               loadTimer = setTimeout(() => {
                   if (!skipTriggered && video.readyState < 3) {
                       skipTriggered = true; spinner.style.display = 'none';
                       showToast('加载超时，已忽略','error'); addToSkipped(url);
                       isFavoritesMode ? playNextFav() : playNext(false);
                   }
               }, 5000);
               
               video.addEventListener('loadeddata', () => {
                   clearTimeout(loadTimer); spinner.style.display = 'none';
                   if (item.classList.contains('active') && isPlaying) video.play().catch(()=>{});
                   if (timeDisplay) timeDisplay.textContent = `00:00 / ${formatTime(video.duration)}`;
                   if (!skipTriggered && video.duration <= 3) {
                       skipTriggered = true; showToast('时长≤3秒，已忽略','error'); addToSkipped(url);
                       isFavoritesMode ? playNextFav() : playNext(false);
                   }
               });
               video.addEventListener('waiting', ()=> spinner.style.display = 'block');
               video.addEventListener('playing', ()=> spinner.style.display = 'none');
               video.addEventListener('timeupdate', ()=>{
                   if (item.classList.contains('active') && video.duration) {
                       if (progressBar) progressBar.style.width = (video.currentTime/video.duration*100)+'%';
                       if (timeDisplay) timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
                   }
               });
               video.addEventListener('ended', ()=>{ if (item.classList.contains('active')) handleVideoEnded(); });
               video.addEventListener('click', ()=> togglePlay(item));
               video.addEventListener('error', ()=>{
                   if (!skipTriggered) { skipTriggered = true; clearTimeout(loadTimer); spinner.style.display='none'; showToast('加载失败，已忽略','error'); addToSkipped(url); isFavoritesMode?playNextFav():playNext(false); }
               });
           }
           
           function handleVideoEnded() {
               if (isLoopMode) {
                   const video = document.querySelector('.video-item.active video');
                   if (video) { video.currentTime = 0; video.play(); }
               } else {
                   hideAutoplayHint();
                   isFavoritesMode ? playNextFav() : playNext();
               }
           }
           
           // 上下滑动/点击切换
           function playNext(immediate = true) { // immediate忽略，直接切换
               hideAutoplayHint(); clearTimeout(loadTimer);
               if (!videoList.length) return showToast('无视频','error');
               if (currentIndex + 1 >= videoList.length) {
                   loadVideos().then(success => { if(success && videoList.length) { currentIndex=0; renderVideos(); } });
               } else { currentIndex++; renderVideos(); }
               isPlaying = true;
           }
           function playPrev() {
               hideAutoplayHint(); clearTimeout(loadTimer);
               if (isFavoritesMode) {
                   if (!favorites.length) return;
                   favCurrentIndex = (favCurrentIndex-1+favorites.length)%favorites.length;
               } else {
                   if (!videoList.length) return;
                   currentIndex = (currentIndex-1+videoList.length)%videoList.length;
               }
               renderVideos(); isPlaying = true;
           }
           function playNextFav() {
               hideAutoplayHint(); clearTimeout(loadTimer);
               if (!favorites.length) { isFavoritesMode=false; renderVideos(); return; }
               favCurrentIndex = (favCurrentIndex+1)%favorites.length;
               renderVideos(); isPlaying = true;
           }
           
           // 手势监听
           function setupGestures() {
               let startY = 0;
               slider.addEventListener('touchstart', e => startY = e.touches[0].clientY, {passive:true});
               slider.addEventListener('touchend', e => {
                   const diff = startY - e.changedTouches[0].clientY;
                   if (Math.abs(diff) > 60) diff>0 ? (isFavoritesMode?playNextFav():playNext()) : playPrev();
               }, {passive:true});
               // 鼠标滚轮
               let wheelTimer;
               slider.addEventListener('wheel', e => {
                   clearTimeout(wheelTimer);
                   wheelTimer = setTimeout(() => { if (e.deltaY > 40) isFavoritesMode?playNextFav():playNext(); else if (e.deltaY < -40) playPrev(); }, 30);
               });
           }
           
           // 双击切换模式
           function setupDoubleTap() {
               slider.addEventListener('touchstart', e => {
                   const now = Date.now();
                   if (now - lastTapTime < 300) { e.preventDefault(); togglePlayMode(); }
                   lastTapTime = now;
               });
               slider.addEventListener('dblclick', e => { e.preventDefault(); togglePlayMode(); });
           }
           
           function togglePlayMode() {
               if (isFavoritesMode) { isFavoritesMode = false; showModeIndicator('普通','fa-list'); }
               else { if (!favorites.length) { showToast('喜欢列表为空','error'); return; } isFavoritesMode = true; favCurrentIndex = 0; showModeIndicator('喜欢','fa-heart'); }
               renderVideos(); updateFavoritesUI();
           }
           
           function showModeIndicator(text, icon) {
               const ind = document.getElementById('modeIndicator');
               ind.querySelector('i').className = `fas ${icon}`;
               ind.querySelector('span').textContent = `切换到${text}`;
               ind.classList.add('show'); setTimeout(()=>ind.classList.remove('show'), 2000);
           }
           
           // UI隐藏 (右滑左滑)
           function setupSwipeHide() {
               let startX=0,startY=0;
               slider.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; });
               slider.addEventListener('touchmove', e => {
                   if (!startX) return;
                   const diffX = e.touches[0].clientX - startX, diffY = Math.abs(e.touches[0].clientY - startY);
                   if (Math.abs(diffX) > 30 && diffY < 20) {
                       uiHidden = diffX > 0 ? true : false;
                       topNav.classList.toggle('hidden', uiHidden);
                       document.querySelectorAll('.action-sidebar, .video-overlay').forEach(el => el.classList.toggle('hidden', uiHidden));
                       startX = 0;
                   }
               });
           }
           
           // 喜欢相关
           window.toggleLike = async (url, btn) => {
               const idx = favorites.indexOf(url);
               const icon = btn.querySelector('.action-icon i'), countSpan = btn.querySelector('.action-count');
               if (idx > -1) {
                   favorites.splice(idx,1); delete favoriteThumbnails[url];
                   icon.className = 'far fa-heart'; countSpan.textContent = '喜欢'; btn.classList.remove('liked');
                   showToast('已取消喜欢','info');
                   if (isFavoritesMode && url === favorites[favCurrentIndex]) { if (!favorites.length) isFavoritesMode=false; else favCurrentIndex%=favorites.length; renderVideos(); }
               } else {
                   favorites.push(url); btn.classList.add('liked'); icon.className='fas fa-heart'; countSpan.textContent='已喜欢'; showToast('已添加喜欢','success');
                   if (!favoriteThumbnails[url]) generateThumbnail(url).then(thumb => { if (thumb) { favoriteThumbnails[url]=thumb; localStorage.setItem('favoriteThumbnails',JSON.stringify(favoriteThumbnails)); updateFavoritesUI(); } });
               }
               localStorage.setItem('videoFavorites',JSON.stringify(favorites));
               updateFavBadge(); updateFavoritesUI();
           };
           
           function updateFavBadge() { 
               const b = document.getElementById('favBadge');
               b.textContent = favorites.length; b.style.display = favorites.length && !favDrawer.classList.contains('open') ? 'block' : 'none';
           }
           
           function updateFavoritesUI() {
               const listDiv = document.getElementById('favoritesList');
               const countSpan = document.getElementById('favCount');
               countSpan.textContent = favorites.length;
               if (!favorites.length) {
                   listDiv.innerHTML = '<div class="empty-favorites"><div class="empty-icon"><i class="fas fa-heart-crack"></i></div><div>还没有喜欢的视频</div></div>'; return;
               }
               const currentUrl = isFavoritesMode ? favorites[favCurrentIndex] : null;
               listDiv.innerHTML = favorites.map((url,i)=>`
                   <div class="favorite-item ${url===currentUrl?'active':''}" onclick="window.playFromFavorites(${i})">
                       <div class="favorite-thumb">${favoriteThumbnails[url] ? `<img src="${favoriteThumbnails[url]}">` : '<i class="fas fa-film"></i>'}<div class="play-icon"><i class="fas fa-play"></i></div></div>
                       <div class="favorite-info"><div class="favorite-name"><i class="fas fa-tag"></i>喜欢 ${i+1}</div><div class="favorite-meta">${url===currentUrl?'<span class="playing-badge"><i class="fas fa-music"></i>播放中</span>':'<span><i class="fas fa-play"></i> 第'+(i+1)+'个</span>'}</div></div>
                       <button class="favorite-remove" onclick="event.stopPropagation(); window.removeFavorite('${url}')"><i class="fas fa-trash-can"></i></button>
                   </div>`).join('');
           }
           
           window.removeFavorite = url => {
               const idx = favorites.indexOf(url);
               if (idx<0) return;
               favorites.splice(idx,1); delete favoriteThumbnails[url];
               localStorage.setItem('videoFavorites',JSON.stringify(favorites));
               localStorage.setItem('favoriteThumbnails',JSON.stringify(favoriteThumbnails));
               if (isFavoritesMode) { if (!favorites.length) isFavoritesMode=false; else if (idx <= favCurrentIndex) favCurrentIndex = Math.max(0,favCurrentIndex-1); renderVideos(); }
               updateFavoritesUI(); updateFavBadge(); showToast('已移除','info');
           };
           
           window.playFromFavorites = i => { if (i>=favorites.length) return; favCurrentIndex = i; isFavoritesMode = true; closeAllDrawers(); renderVideos(); };
           
           function playFavoritesMode() { if (!favorites.length) return showToast('喜欢列表为空','error'); isFavoritesMode = true; favCurrentIndex = 0; closeAllDrawers(); renderVideos(); }
           
           // 忽略抽屉
           function toggleSkipDrawer() { 
               skipDrawer.classList.toggle('open'); 
               overlay.classList.toggle('active'); 
               renderSkipList(); 
           }
           
           function renderSkipList() {
               const c = document.getElementById('skipList');
               if (!c) return;
               if (!skippedUrls.length) { 
                   c.innerHTML = '<div class="empty-skip"><i class="fas fa-ban"></i><p>暂无忽略记录</p></div>'; 
                   return; 
               }
               c.innerHTML = skippedUrls.map((url,i)=>`
                   <div class="skip-item"><span class="index">${i+1}</span><span class="url-preview" title="${url}">${url.slice(0,40)}${url.length>40?'…':''}</span>
                   <button class="play-skip-btn" onclick="window.playSingleSkipped('${url}')"><i class="fas fa-play"></i></button>
                   <button class="remove-skip-btn" onclick="window.removeSingleSkipped('${url}')"><i class="fas fa-times"></i></button></div>`).join('');
           }
           
           window.playSingleSkipped = url => {
               isFavoritesMode = false;
               videoList = [{ url, author:'临时', describe:'' }, ...videoList.filter(v=>v.url!==url)];
               currentIndex = 0; renderVideos(); toggleSkipDrawer();
           };
           
           window.playAllSkipped = () => { 
               if (!skippedUrls.length) return; 
               isFavoritesMode = false; 
               videoList = skippedUrls.map(url=>({url})); 
               currentIndex = 0; 
               renderVideos(); 
               toggleSkipDrawer(); 
           };
           
           window.removeSingleSkipped = url => { 
               skippedUrls = skippedUrls.filter(u=>u!==url); 
               localStorage.setItem('skippedVideoUrls',JSON.stringify(skippedUrls)); 
               updateSkipBadge(); 
               renderSkipList(); 
           };
           
           function clearAllSkipped() { 
               skippedUrls = []; 
               localStorage.setItem('skippedVideoUrls','[]'); 
               updateSkipBadge(); 
               renderSkipList(); 
               showToast('已清空','success'); 
           }
           
           // 关闭所有侧栏
           function closeAllDrawers() { 
               favDrawer.classList.remove('open'); 
               skipDrawer.classList.remove('open'); 
               overlay.classList.remove('active'); 
               updateFavBadge(); 
           }
           
           // 其他全局函数
           window.toggleLoopMode = btn => {
               isLoopMode = !isLoopMode;
               const video = document.querySelector('.video-item.active video'); if (video) video.loop = isLoopMode;
               document.querySelectorAll('.action-btn[onclick*="toggleLoopMode"]').forEach(b => {
                   b.classList.toggle('loop-active', isLoopMode);
                   b.querySelector('.action-icon i').className = `fas ${isLoopMode?'fa-repeat':'fa-forward'}`;
                   b.querySelector('.action-count').textContent = isLoopMode?'循环':'连续';
               });
               showToast(isLoopMode?'循环开启':'连续开启','info');
           };
           
           window.copyLink = url => { 
               navigator.clipboard?.writeText(url).then(()=>showToast('链接已复制','success')).catch(()=>showToast('复制失败','error')); 
           };
           
           window.seekVideo = (e, cont) => {
               const video = cont.parentElement.querySelector('video'); if (!video?.duration) return;
               const rect = cont.querySelector('.progress-bar-container').getBoundingClientRect();
               video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
           };
           
           window.togglePlay = item => {
               const video = item.querySelector('video'), cp = document.getElementById('centerPlay');
               if (video.paused) { video.play(); isPlaying = true; cp.innerHTML='<i class="fas fa-play"></i>'; hideAutoplayHint(); } 
               else { video.pause(); isPlaying = false; cp.innerHTML='<i class="fas fa-pause"></i>'; cp.classList.add('show'); setTimeout(()=>cp.classList.remove('show'),1000); }
           };
           
           function toggleFavorites() { 
               favDrawer.classList.toggle('open'); 
               overlay.classList.toggle('active'); 
               updateFavoritesUI(); 
               updateFavBadge(); 
           }
           
           function hideAutoplayHint() { 
               document.getElementById('autoplayHint').classList.remove('show'); 
               clearTimeout(autoplayTimer); 
               clearInterval(countdownTimer); 
           }
           
           // 暴露全局方法
           window.toggleSkipDrawer = toggleSkipDrawer;
           window.playAllSkipped = playAllSkipped;
           window.clearAllSkipped = clearAllSkipped;
           window.playSingleSkipped = playSingleSkipped;
           window.removeSingleSkipped = removeSingleSkipped;
           window.toggleFavorites = toggleFavorites;
           window.closeAllDrawers = closeAllDrawers;
           window.playFavoritesMode = playFavoritesMode;
           window.playFromFavorites = playFromFavorites;
           window.removeFavorite = removeFavorite;
           window.playNext = playNext;
           window.playPrev = playPrev;
           window.playNextFav = playNextFav;
           
           // 初始化
           (async function init() {
               await loadVideos();
               renderVideos();
               setupGestures(); setupSwipeHide(); setupDoubleTap();
               updateFavoritesUI(); updateSkipBadge(); renderSkipList();
           })();
       })();
   </script>
</body>
</html>
