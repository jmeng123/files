<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全屏短视频播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #app {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        /* 加载动画 */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 10;
        }
        
        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        /* 触摸层 */
        .touch-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 20;
        }
        
        /* 播放/暂停图标 */
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 40;
            transition: transform 0.2s ease;
            pointer-events: none;
        }
        
        .play-icon.show {
            transform: translate(-50%, -50%) scale(1);
        }
        
        .play-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }
        
        /* 右侧操作按钮 - 调整为与顶部按钮一致的大小 */
        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 30;
        }
        
        .action-btn {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            position: relative;
        }
        
        .action-btn:active {
            transform: scale(0.9);
        }
        
        .action-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
            transition: all 0.2s;
        }
        
        /* 抖音风格喜欢按钮 - 变红即可 */
        .action-btn.liked svg {
            fill: #fe2c55;
        }
        
        /* 底部信息 - 不显示接口名 */
        .video-info {
            position: absolute;
            bottom: 20px;
            left: 15px;
            right: 80px;
            color: white;
            z-index: 25;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        
        .video-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .video-desc {
            font-size: 13px;
            opacity: 0.8;
            line-height: 1.3;
        }
        
        /* 进度条 */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255,255,255,0.2);
            z-index: 30;
        }
        
        .progress-bar {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.1s linear;
        }
        
        /* 顶部按钮 */
        .top-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 30;
        }
        
        .top-btn {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .top-btn:active {
            transform: scale(0.9);
        }
        
        .top-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }
        
        .top-btn.active svg {
            fill: #fe2c55;
        }
        
        /* 弹窗通用样式 */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .modal-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }
        
        .close-btn {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        /* 分类列表 */
        .category-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
        }
        
        .category-item {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px 8px;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .category-item:active {
            transform: scale(0.95);
        }
        
        .category-item.active {
            background: rgba(254,44,85,0.3);
            border-color: #fe2c55;
        }
        
        .category-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }
        
        .category-name {
            font-size: 12px;
            font-weight: 500;
        }
        
        /* 视频列表项 */
        .video-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .video-item:active {
            background: rgba(255,255,255,0.1);
        }
        
        .video-item.active {
            background: rgba(254,44,85,0.2);
            border: 1px solid rgba(254,44,85,0.5);
        }
        
        .item-thumb {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        
        .item-info {
            flex: 1;
            color: white;
            min-width: 0;
        }
        
        .item-title {
            font-size: 14px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .item-meta {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        
        .item-status {
            color: #fe2c55;
            font-size: 12px;
        }
        
        .item-actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .item-action-btn {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .item-action-btn.liked svg {
            fill: #fe2c55;
        }
        
        .item-action-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }
        
        /* 提示 */
        .toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 200;
            transition: transform 0.2s ease;
        }
        
        .toast.show {
            transform: translate(-50%, -50%) scale(1);
        }
        
        /* 切换提示 */
        .switch-hint {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 13px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 35;
            pointer-events: none;
        }
        
        .switch-hint.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        .switch-hint.prev { top: 100px; }
        .switch-hint.next { bottom: 100px; }
        
        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: rgba(255,255,255,0.5);
        }
        
        /* 错误提示 */
        .error-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .error-overlay.show {
            display: flex;
        }
        
        .retry-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #fe2c55;
            border: none;
            color: white;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
        
        /* 加载遮罩 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 150;
            color: white;
            font-size: 16px;
            flex-direction: column;
        }
        
        .loading-overlay.show {
            display: flex;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="video-container">
            <video id="videoPlayer" playsinline webkit-playsinline loop></video>
            <div class="loading" id="loading"></div>
            
            <!-- 触摸层 -->
            <div class="touch-layer" id="touchLayer"></div>
            
            <!-- 播放/暂停图标 -->
            <div class="play-icon" id="playIcon">
                <svg viewBox="0 0 24 24" id="playIconSvg"><path d="M8 5v14l11-7z"/></svg>
            </div>
            
            <!-- 切换提示 -->
            <div class="switch-hint prev" id="prevHint">⬆ 上一个</div>
            <div class="switch-hint next" id="nextHint">⬇ 下一个</div>
            
            <!-- 顶部按钮 -->
            <div class="top-actions">
                <button class="top-btn" id="favListBtn" title="喜欢的视频">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </button>
                <button class="top-btn" id="categoryListBtn" title="分类列表">
                    <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
                </button>
            </div>
            
            <!-- 右侧操作按钮 - 调整为与顶部按钮一致 -->
            <div class="side-actions" id="sideActions">
                <button class="action-btn" id="likeBtn" title="喜欢">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </button>
                <button class="action-btn" id="shareBtn" title="分享">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                </button>
                <button class="action-btn" id="downloadBtn" title="下载">
                    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                </button>
            </div>
            
            <!-- 底部信息 - 不显示接口名 -->
            <div class="video-info">
                <div class="video-title" id="videoTitle"></div>
                <div class="video-desc" id="videoDesc">双击播放/暂停 · 上下滑动切换视频 · 左滑切换分类</div>
            </div>
            
            <!-- 进度条 -->
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <!-- 分类列表弹窗 -->
            <div class="modal" id="categoryModal">
                <div class="modal-header">
                    <span class="modal-title">选择分类</span>
                    <button class="close-btn" id="closeCategory">✕</button>
                </div>
                <div class="modal-content">
                    <div class="category-list" id="categoryList"></div>
                </div>
            </div>
            
            <!-- 喜欢的视频列表弹窗 -->
            <div class="modal" id="favListModal">
                <div class="modal-header">
                    <span class="modal-title">喜欢的视频 (<span id="favListCount">0</span>)</span>
                    <button class="close-btn" id="closeFavList">✕</button>
                </div>
                <div class="modal-content" id="favListContent"></div>
            </div>
            
            <!-- 提示 -->
            <div class="toast" id="toast">
                <div id="toastText">操作成功</div>
            </div>
            
            <!-- 错误提示 -->
            <div class="error-overlay" id="errorOverlay">
                <div style="font-size: 48px; margin-bottom: 10px;">⚠️</div>
                <div id="errorText">加载失败</div>
                <button class="retry-btn" id="retryBtn">重新加载</button>
            </div>
            
            <!-- 加载遮罩 -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading" style="position: static; transform: none; margin-bottom: 15px;"></div>
                <div>正在加载...</div>
            </div>
        </div>
    </div>

    <script>
        // 接口配置 - 性感添加到包臀裙后面
        const API_LIST = [
            { name: '包臀裙', url: 'https://gitee.com/xiteledeyayi/json/raw/master/短视频/btq.txt', icon: '👗' },
            { name: '性感', url: 'https://gitee.com/xiteledeyayi/json/raw/master/短视频/sf.txt', icon: '🔥' },
            { name: '旗袍', url: 'https://gitee.com/xiteledeyayi/json/raw/master/短视频/qp.txt', icon: '👘' },
            { name: '热舞', url: 'https://gitee.com/xiteledeyayi/json/raw/master/短视频/rw.txt', icon: '💃' },
            { name: '玉足', url: 'https://gitee.com/xiteledeyayi/json/raw/master/短视频/ymg.txt', icon: '🦶' },
            { name: '瑜伽', url: 'https://gitee.com/xiteledeyayi/json/raw/master/短视频/yj.txt', icon: '🧘' },
            { name: '黑丝', url: 'https://gitee.com/xiteledeyayi/json/raw/master/短视频/hs.txt', icon: '🖤' },
            { name: '白丝', url: 'https://gitee.com/xiteledeyayi/json/raw/master/短视频/bs.txt', icon: '🤍' },
            { name: '美女', url: 'https://gitee.com/xiteledeyayi/json/raw/master/短视频/mn.txt', icon: '👩' },
            { name: '车模', url: 'https://gitee.com/xiteledeyayi/json/raw/master/短视频/cm.txt', icon: '🚗' },
            { name: '豹纹', url: 'https://gitee.com/xiteledeyayi/json/raw/master/短视频/bw.txt', icon: '🐆' },
            { name: '紫色韵味', url: 'https://gitee.com/xiteledeyayi/json/raw/master/短视频/zsyw.txt', icon: '💜' },
            { name: '红色韵味', url: 'https://gitee.com/xiteledeyayi/json/raw/master/短视频/hsyw.txt', icon: '❤️' }
        ];
        
        // 状态
        let currentCategoryIndex = 0;
        let videoUrls = [];
        let likedVideos = JSON.parse(localStorage.getItem('likedVideos') || '[]');
        let currentIndex = 0;
        let isPlaying = true;
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;
        let isTouching = false;
        let hasMoved = false;
        let lastTapTime = 0;
        let tapCount = 0;
        let tapTimeout = null;
        
        // DOM元素
        const video = document.getElementById('videoPlayer');
        const loading = document.getElementById('loading');
        const touchLayer = document.getElementById('touchLayer');
        const playIcon = document.getElementById('playIcon');
        const playIconSvg = document.getElementById('playIconSvg');
        const videoTitle = document.getElementById('videoTitle');
        const videoDesc = document.getElementById('videoDesc');
        const progressBar = document.getElementById('progressBar');
        const likeBtn = document.getElementById('likeBtn');
        const favListBtn = document.getElementById('favListBtn');
        const categoryListBtn = document.getElementById('categoryListBtn');
        const categoryModal = document.getElementById('categoryModal');
        const favListModal = document.getElementById('favListModal');
        const categoryList = document.getElementById('categoryList');
        const favListContent = document.getElementById('favListContent');
        const favListCount = document.getElementById('favListCount');
        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toastText');
        const errorOverlay = document.getElementById('errorOverlay');
        const errorText = document.getElementById('errorText');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // 解析视频列表
        function parseVideoList(text) {
            const lines = text.split('\n');
            const urls = [];
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                let url = line;
                const match = line.match(/https?:\/\/[^\s"']+/);
                if (match) url = match[0];
                url = url.replace(/[",'\[\]{}]+$/, '');
                if (url.match(/^https?:\/\/.+/)) urls.push(url);
            }
            return urls;
        }
        
        // 检查是否喜欢
        function isLiked(url) {
            return likedVideos.includes(url);
        }
        
        // 切换喜欢状态 - 抖音风格
        function toggleLike() {
            const currentUrl = videoUrls[currentIndex];
            const index = likedVideos.indexOf(currentUrl);
            
            if (index > -1) {
                likedVideos.splice(index, 1);
                likeBtn.classList.remove('liked');
                showToast('已取消喜欢');
            } else {
                likedVideos.push(currentUrl);
                likeBtn.classList.add('liked');
                showToast('已喜欢');
            }
            
            localStorage.setItem('likedVideos', JSON.stringify(likedVideos));
            updateFavListBtn();
        }
        
        // 更新喜欢列表按钮状态
        function updateFavListBtn() {
            if (likedVideos.length > 0) {
                favListBtn.classList.add('active');
            } else {
                favListBtn.classList.remove('active');
            }
        }
        
        // 显示提示
        function showToast(text) {
            toastText.textContent = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }
        
        // 分享功能
        function shareVideo() {
            if (videoUrls.length === 0) return;
            const url = videoUrls[currentIndex];
            
            navigator.clipboard.writeText(url).then(() => {
                showToast('链接已复制');
            }).catch(() => {
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('链接已复制');
            });
        }
        
        // 切换分类
        function switchCategory(direction) {
            let newIndex = currentCategoryIndex + direction;
            if (newIndex < 0) newIndex = API_LIST.length - 1;
            if (newIndex >= API_LIST.length) newIndex = 0;
            
            currentCategoryIndex = newIndex;
            currentIndex = 0;
            
            showToast(API_LIST[currentCategoryIndex].name);
            fetchVideoList();
        }
        
        // 获取视频列表
        async function fetchVideoList() {
            loading.style.display = 'block';
            errorOverlay.classList.remove('show');
            
            try {
                const api = API_LIST[currentCategoryIndex];
                const url = api.url + '?t=' + Date.now();
                
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP错误: ${response.status}`);
                
                const text = await response.text();
                const urls = parseVideoList(text);
                
                if (urls.length === 0) throw new Error('未找到有效的视频地址');
                
                videoUrls = urls;
                console.log(`[${api.name}] 成功加载 ${urls.length} 个视频`);
                
                if (currentIndex >= videoUrls.length) currentIndex = 0;
                
                loadVideo(currentIndex);
                updateFavListBtn();
                
            } catch (error) {
                console.error('获取失败:', error);
                errorText.textContent = `获取[${API_LIST[currentCategoryIndex].name}]失败: ${error.message}`;
                errorOverlay.classList.add('show');
            }
        }
        
        // 加载视频
        function loadVideo(index) {
            if (videoUrls.length === 0) return;
            
            if (index < 0) index = videoUrls.length - 1;
            if (index >= videoUrls.length) index = 0;
            
            currentIndex = index;
            const currentUrl = videoUrls[currentIndex];
            
            video.src = currentUrl;
            video.load();
            
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                }).catch(() => {
                    isPlaying = false;
                    updatePlayIcon();
                });
            }
            
            // 不显示视频名称，只显示序号信息
            videoTitle.textContent = '';
            videoDesc.textContent = `${currentIndex + 1} / ${videoUrls.length}`;
            
            likeBtn.classList.toggle('liked', isLiked(currentUrl));
            
            loading.style.display = 'block';
        }
        
        // 更新播放图标
        function updatePlayIcon() {
            if (isPlaying) {
                playIconSvg.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                playIconSvg.innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
        }
        
        // 切换播放状态
        function togglePlay() {
            if (video.paused) {
                video.play().then(() => {
                    isPlaying = true;
                    updatePlayIcon();
                    playIcon.classList.add('show');
                    setTimeout(() => playIcon.classList.remove('show'), 500);
                }).catch(err => {
                    console.error('播放失败:', err);
                });
            } else {
                video.pause();
                isPlaying = false;
                updatePlayIcon();
                playIcon.classList.add('show');
                setTimeout(() => playIcon.classList.remove('show'), 500);
            }
        }
        
        // 切换视频
        function prevVideo() {
            document.getElementById('prevHint').classList.add('show');
            setTimeout(() => document.getElementById('prevHint').classList.remove('show'), 800);
            loadVideo(currentIndex - 1);
        }
        
        function nextVideo() {
            document.getElementById('nextHint').classList.add('show');
            setTimeout(() => document.getElementById('nextHint').classList.remove('show'), 800);
            loadVideo(currentIndex + 1);
        }
        
        // 下载视频
        function downloadVideo() {
            if (videoUrls.length === 0) return;
            const url = videoUrls[currentIndex];
            
            showToast('开始下载...');
            
            fetch(url)
                .then(response => response.blob())
                .then(blob => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `video_${currentIndex + 1}.mp4`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    showToast('下载完成');
                })
                .catch(() => {
                    window.open(url, '_blank');
                    showToast('已在新窗口打开');
                });
        }
        
        // 渲染分类列表
        function renderCategoryList() {
            categoryList.innerHTML = '';
            
            API_LIST.forEach((api, index) => {
                const item = document.createElement('div');
                item.className = 'category-item';
                if (index === currentCategoryIndex) item.classList.add('active');
                
                item.innerHTML = `
                    <div class="category-icon">${api.icon}</div>
                    <div class="category-name">${api.name}</div>
                `;
                
                item.addEventListener('click', () => {
                    currentCategoryIndex = index;
                    currentIndex = 0;
                    fetchVideoList();
                    hideAllModals();
                });
                
                categoryList.appendChild(item);
            });
        }
        
        // 从URL提取文件名
        function getFileName(url) {
            try {
                return url.split('/').pop().split('?')[0] || '未知视频';
            } catch {
                return '未知视频';
            }
        }
        
        // 从URL判断分类
        function getCategoryFromUrl(url) {
            for (let i = 0; i < API_LIST.length; i++) {
                const apiFileName = API_LIST[i].url.split('/').pop().replace('.txt', '');
                if (url.includes(apiFileName)) {
                    return { index: i, name: API_LIST[i].name, api: API_LIST[i] };
                }
            }
            return null;
        }
        
        // 渲染喜欢列表
        function renderFavList() {
            favListContent.innerHTML = '';
            favListCount.textContent = likedVideos.length;
            
            if (likedVideos.length === 0) {
                favListContent.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 10px;">💔</div>
                        <div>暂无喜欢的视频</div>
                    </div>
                `;
                return;
            }
            
            const reversedLiked = [...likedVideos].reverse();
            
            reversedLiked.forEach((url) => {
                const categoryInfo = getCategoryFromUrl(url);
                const categoryName = categoryInfo ? categoryInfo.name : '未知分类';
                const fileName = getFileName(url);
                
                const item = document.createElement('div');
                item.className = 'video-item';
                
                const isCurrentPlaying = (url === video.src);
                if (isCurrentPlaying) {
                    item.classList.add('active');
                }
                
                item.innerHTML = `
                    <div class="item-thumb">🎬</div>
                    <div class="item-info">
                        <div class="item-title">${fileName.substring(0, 25)}</div>
                        <div class="item-meta">
                            <span style="color: ${categoryInfo ? '#fe2c55' : '#888'}">${categoryName}</span>
                            ${isCurrentPlaying ? '<span class="item-status"> ● 播放中</span>' : ''}
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="item-action-btn liked" data-url="${url}" title="取消喜欢">
                            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </button>
                    </div>
                `;
                
                // 点击播放
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.item-action-btn')) return;
                    playLikedVideo(url);
                });
                
                // 取消喜欢
                const unlikeBtn = item.querySelector('.item-action-btn');
                unlikeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const urlToRemove = unlikeBtn.dataset.url;
                    const actualIndex = likedVideos.indexOf(urlToRemove);
                    
                    if (actualIndex > -1) {
                        likedVideos.splice(actualIndex, 1);
                        localStorage.setItem('likedVideos', JSON.stringify(likedVideos));
                        
                        if (urlToRemove === videoUrls[currentIndex]) {
                            likeBtn.classList.remove('liked');
                        }
                        
                        updateFavListBtn();
                        showToast('已取消');
                        renderFavList();
                    }
                });
                
                favListContent.appendChild(item);
            });
        }
        
        // 播放喜欢的视频
        async function playLikedVideo(targetUrl) {
            loadingOverlay.classList.add('show');
            hideAllModals();
            
            const categoryInfo = getCategoryFromUrl(targetUrl);
            
            if (!categoryInfo) {
                video.src = targetUrl;
                video.load();
                video.play().catch(() => {});
                loadingOverlay.classList.remove('show');
                return;
            }
            
            if (categoryInfo.index !== currentCategoryIndex) {
                currentCategoryIndex = categoryInfo.index;
                
                try {
                    const api = API_LIST[currentCategoryIndex];
                    const response = await fetch(api.url + '?t=' + Date.now());
                    const text = await response.text();
                    videoUrls = parseVideoList(text);
                } catch (err) {
                    showToast('切换失败');
                    loadingOverlay.classList.remove('show');
                    return;
                }
            }
            
            const videoIndex = videoUrls.indexOf(targetUrl);
            
            if (videoIndex !== -1) {
                currentIndex = videoIndex;
                loadVideo(currentIndex);
            } else {
                videoUrls.unshift(targetUrl);
                currentIndex = 0;
                loadVideo(0);
            }
            
            loadingOverlay.classList.remove('show');
        }
        
        // 显示/隐藏弹窗
        function showCategoryList() {
            renderCategoryList();
            categoryModal.classList.add('show');
        }
        
        function showFavList() {
            renderFavList();
            favListModal.classList.add('show');
        }
        
        function hideAllModals() {
            categoryModal.classList.remove('show');
            favListModal.classList.remove('show');
        }
        
        // 触摸事件 - 左滑切换分类，右滑无操作
        touchLayer.addEventListener('touchstart', (e) => {
            isTouching = true;
            hasMoved = false;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
        }, { passive: true });
        
        touchLayer.addEventListener('touchmove', (e) => {
            if (!isTouching) return;
            const touchX = e.touches[0].clientX;
            const touchY = e.touches[0].clientY;
            const diffX = Math.abs(touchX - touchStartX);
            const diffY = Math.abs(touchY - touchStartY);
            
            if (diffX > 10 || diffY > 10) {
                hasMoved = true;
            }
        }, { passive: true });
        
        touchLayer.addEventListener('touchend', (e) => {
            if (!isTouching) return;
            isTouching = false;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;
            const duration = Date.now() - touchStartTime;
            
            // 滑动检测
            if (Math.abs(diffX) > 50 || Math.abs(diffY) > 50) {
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    // 水平滑动
                    if (diffX > 0) {
                        // 左滑 - 切换分类（下一个）
                        switchCategory(1);
                    }
                    // 右滑 - 无操作
                } else {
                    // 垂直滑动 - 切换视频
                    if (diffY > 0) nextVideo();
                    else prevVideo();
                }
                return;
            }
            
            // 双击播放/暂停
            if (!hasMoved && duration < 300) {
                const currentTime = Date.now();
                const timeSinceLastTap = currentTime - lastTapTime;
                
                tapCount++;
                
                if (tapCount === 1) {
                    tapTimeout = setTimeout(() => {
                        tapCount = 0;
                    }, 250);
                } else if (tapCount === 2 && timeSinceLastTap < 250) {
                    clearTimeout(tapTimeout);
                    tapCount = 0;
                    togglePlay();
                }
                
                lastTapTime = currentTime;
            }
        }, { passive: true });
        
        // 鼠标事件
        let mouseDown = false;
        let mouseMoved = false;
        
        touchLayer.addEventListener('mousedown', (e) => {
            mouseDown = true;
            mouseMoved = false;
            touchStartX = e.clientX;
            touchStartY = e.clientY;
            touchStartTime = Date.now();
        });
        
        touchLayer.addEventListener('mousemove', (e) => {
            if (!mouseDown) return;
            const diffX = Math.abs(e.clientX - touchStartX);
            const diffY = Math.abs(e.clientY - touchStartY);
            if (diffX > 10 || diffY > 10) mouseMoved = true;
        });
        
        touchLayer.addEventListener('mouseup', (e) => {
            if (!mouseDown) return;
            mouseDown = false;
            
            const diffX = touchStartX - e.clientX;
            const diffY = touchStartY - e.clientY;
            const duration = Date.now() - touchStartTime;
            
            if (Math.abs(diffX) > 50 || Math.abs(diffY) > 50) {
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX > 0) {
                        switchCategory(1);
                    }
                } else {
                    if (diffY > 0) nextVideo();
                    else prevVideo();
                }
                return;
            }
            
            if (!mouseMoved && duration < 300) {
                const currentTime = Date.now();
                const timeSinceLastTap = currentTime - lastTapTime;
                
                tapCount++;
                
                if (tapCount === 1) {
                    tapTimeout = setTimeout(() => {
                        tapCount = 0;
                    }, 250);
                } else if (tapCount === 2 && timeSinceLastTap < 250) {
                    clearTimeout(tapTimeout);
                    tapCount = 0;
                    togglePlay();
                }
                
                lastTapTime = currentTime;
            }
        });
        
        // 视频事件
        video.addEventListener('waiting', () => loading.style.display = 'block');
        video.addEventListener('playing', () => {
            loading.style.display = 'none';
            isPlaying = true;
        });
        video.addEventListener('pause', () => {
            isPlaying = false;
        });
        video.addEventListener('canplay', () => loading.style.display = 'none');
        video.addEventListener('timeupdate', () => {
            if (video.duration) {
                progressBar.style.width = (video.currentTime / video.duration * 100) + '%';
            }
        });
        video.addEventListener('ended', nextVideo);
        video.addEventListener('error', () => {
            loading.style.display = 'none';
            errorText.textContent = '视频加载失败';
            errorOverlay.classList.add('show');
        });
        
        // 按钮事件
        likeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleLike();
        });
        
        document.getElementById('shareBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            shareVideo();
        });
        
        document.getElementById('downloadBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            downloadVideo();
        });
        
        favListBtn.addEventListener('click', showFavList);
        categoryListBtn.addEventListener('click', showCategoryList);
        document.getElementById('closeCategory').addEventListener('click', hideAllModals);
        document.getElementById('closeFavList').addEventListener('click', hideAllModals);
        document.getElementById('retryBtn').addEventListener('click', fetchVideoList);
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case ' ': 
                    e.preventDefault();
                    togglePlay(); 
                    break;
                case 'ArrowUp': prevVideo(); break;
                case 'ArrowDown': nextVideo(); break;
                case 'ArrowLeft': switchCategory(1); break;
                case 'l': toggleLike(); break;
                case 'Escape': hideAllModals(); break;
            }
        });
        
        // 初始化
        updateFavListBtn();
        fetchVideoList();
    </script>
</body>
</html>
